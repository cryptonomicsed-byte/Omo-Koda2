apiVersion: apps/v1
kind: Deployment
metadata:
  name: oya
  namespace: omokoda
  labels:
    app: oya
    component: flow-control
    part-of: omo-koda
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oya
  template:
    metadata:
      labels:
        app: oya
        component: flow-control
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: oya
          image: ghcr.io/omo-koda/omokoda-go:latest
          imagePullPolicy: Always
          args: ["oya"]
          ports:
            - name: grpc
              containerPort: 50052
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 5
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
---
apiVersion: v1
kind: Service
metadata:
  name: oya
  namespace: omokoda
  labels:
    app: oya
    component: flow-control
spec:
  selector:
    app: oya
  ports:
    - name: grpc
      port: 50052
      targetPort: grpc
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  type: ClusterIP
