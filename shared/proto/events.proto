syntax = "proto3";

package omokoda.v1;

message AgentBorn {
  string dna = 1;
  repeated string mnemonic = 2;
  uint32 odu = 3;
}

message ThoughtSealed {
  bytes intent_hash = 1;
  float hermetic_score = 2;
}

message ActExecuted {
  string tool = 1;
  bytes receipt_merkle = 2;
  float f1_score = 3;
}

message TocMinted {
  string agent = 1;
  uint64 dopamine_burned = 2;
  uint64 synapse_earned = 3;
}

message TierAdvanced {
  string agent = 1;
  uint32 old_tier = 2;
  uint32 new_tier = 3;
}

message AuditPassed {
  string receipt_id = 1;
  bytes zangbeto_sig = 2;
}

message SabbathEntered {
  repeated string agents_paused = 1;
  uint32 queued_ops = 2;
}

message Denial {
  string tool = 1;
  string reason = 2;
  string resource = 3;
}

message Audit {
  string event_type = 1;
  string details = 2;
  uint64 timestamp = 3;
}

// ── Block Mesh events ─────────────────────────────────────────────────────────

message NeighborDiscovered {
  string agent_id = 1;
  string block_id = 2;
  bytes public_key = 3;
  uint32 membership = 4;  // 0=probation 1=active 2=suspended
}

message ProposalReceived {
  string negotiation_id = 1;
  string proposer = 2;
  string give_summary = 3;
  string take_summary = 4;
  uint64 ttl_ms = 5;
}

message ProposalResponded {
  string negotiation_id = 1;
  string respondent = 2;
  string decision = 3;  // "accept" | "reject" | "counter"
}

message ResourceReserved {
  string resource_id = 1;
  string reserved_by = 2;
  uint64 reserved_from = 3;
  uint64 reserved_until = 4;
}

message TrustUpdated {
  string agent_id = 1;
  float old_score = 2;
  float new_score = 3;
  string reason = 4;
}

message DisputeFiled {
  string negotiation_id = 1;
  string filer = 2;
  string respondent = 3;
  string reason = 4;
}

message PatternFinding {
  string block_id = 1;
  string finding_type = 2;  // "correlation" | "demand_forecast" | "reliability"
  string summary = 3;
  float confidence = 4;
}

// ── Sovereign trust-graph events (Phase 2a) ───────────────────────────────────

message TrustSignalPublished {
  string agent_id = 1;
  string neighbor_id = 2;
  string kind = 3;
  float weight = 4;
}

message NeighborProposed {
  string proposer = 1;
  string candidate = 2;
  string block_id = 3;
}

message CapabilityVerified {
  string agent_id = 1;
  string capability = 2;
  bool passed = 3;
}

message ProbationEscalated {
  string subject = 1;
  string level = 2;
  string reason = 3;
}

message ResourceOffered {
  string agent_id = 1;
  string resource_id = 2;
  string kind = 3;
}

message SovereignEvent {
  oneof event {
    AgentBorn agent_born = 1;
    ThoughtSealed thought_sealed = 2;
    ActExecuted act_executed = 3;
    TocMinted toc_minted = 4;
    TierAdvanced tier_advanced = 5;
    AuditPassed audit_passed = 6;
    SabbathEntered sabbath_entered = 7;
    Denial denial = 8;
    Audit audit = 9;
    NeighborDiscovered neighbor_discovered = 10;
    ProposalReceived proposal_received = 11;
    ProposalResponded proposal_responded = 12;
    ResourceReserved resource_reserved = 13;
    TrustUpdated trust_updated = 14;
    DisputeFiled dispute_filed = 15;
    PatternFinding pattern_finding = 16;
    TrustSignalPublished trust_signal_published = 17;
    NeighborProposed neighbor_proposed = 18;
    CapabilityVerified capability_verified = 19;
    ProbationEscalated probation_escalated = 20;
    ResourceOffered resource_offered = 21;
  }
}
